<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8A2387;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E94057;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F27121;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <g filter="url(#shadow)">
    <!-- Main picture frame -->
    <rect x="110" y="110" width="292" height="292" rx="36" fill="url(#iconGrad)"/>
    
    <!-- Transparent checkerboard preview on right half -->
    <clipPath id="rightHalf">
      <rect x="256" y="110" width="146" height="292" rx="0"/>
    </clipPath>
    <g clip-path="url(#rightHalf)">
      <rect x="110" y="110" width="292" height="292" fill="#e0e0e0"/>
      <path d="M 256,110 L 256,402 M 286,110 L 286,402 M 316,110 L 316,402 M 346,110 L 346,402 M 376,110 L 376,402 M 406,110 L 406,402" stroke="#ffffff" stroke-width="15" stroke-dasharray="15"/>
    </g>
    
    <!-- Left side picture content (Mountain/Sun) -->
    <clipPath id="leftHalf">
      <rect x="110" y="110" width="146" height="292"/>
    </clipPath>
    <g clip-path="url(#leftHalf)">
      <circle cx="170" cy="180" r="30" fill="#FF512F"/>
      <path d="M110 320 L170 240 L230 320 Z" fill="#3a7bd5"/>
      <path d="M160 350 L220 270 L280 350 Z" fill="#3a6073" opacity="0.8"/>
    </g>
    
    <!-- Center Dividing Line (Sleek slider bar) -->
    <line x1="256" y1="90" x2="256" y2="422" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <circle cx="256" cy="256" r="24" fill="#ffffff" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.2))"/>
    <path d="M246 256 L252 250 L252 262 Z" fill="#8A2387"/>
    <path d="M266 256 L260 250 L260 262 Z" fill="#8A2387"/>

    <!-- Compression indicator arrows -->
    <path d="M80 80 L120 80 L120 120 M80 80 L130 130" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
    <path d="M432 432 L392 432 L392 392 M432 432 L382 382" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  </g>
</svg>